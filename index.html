<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, fast currency converter with live exchange rates.">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <button id="theme-btn" type="button">🌙 Dark Mode</button>
        <h2>Currency Converter</h2>
        <form>
            <div class="amount">
                <label for="amount-input">Enter Amount</label>
                <input id="amount-input" value="100" type="number" min="1" step="any" inputmode="decimal">
            </div>
            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="USD flag">
                        <select name="From" aria-label="From currency">

                        </select>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left" title="Swap currencies" role="button" aria-label="Swap currencies"></i>
                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt="INR flag">
                        <select name="To" aria-label="To currency">

                        </select>
                    </div>
                </div>
            </div>
            <div class="msg">Loading rate...</div>
            <div class="last-updated"></div>

            <div class="trend">
                <div class="trend-header">
                    <span>Rate Trend</span>
                    <div class="trend-range">
                        <button type="button" data-days="7" class="active">7D</button>
                        <button type="button" data-days="30">30D</button>
                    </div>
                </div>
                <div id="trend-chart"></div>
                <div class="trend-label"></div>
            </div>

            <div class="result-actions">
                <button id="copy-btn" type="button">📋 Copy Result</button>
            </div>

            <button type="submit">Get Exchange Rate</button>
        </form>
    </div>
    <script src="code.js"></script>
    <script src="app.js"></script>
</body>
</html>
